version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: basketops_postgres
    environment:
      POSTGRES_USER: basketadmin
      POSTGRES_PASSWORD: basketpassword
      POSTGRES_DB: basketops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: